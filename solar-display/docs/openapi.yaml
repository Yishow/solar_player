openapi: 3.1.0
info:
  title: Kuozui Green Energy Display API
  version: 0.1.0
  description: Phase 1 skeleton API for the solar display platform.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags:
        - System
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          description: Service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          const: ok
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - success
        - error
        - timestamp
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string
        timestamp:
          type: string
          format: date-time
