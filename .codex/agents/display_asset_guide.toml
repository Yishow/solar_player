name = "display_asset_guide"
description = "展示牆素材生成與治理專用 agent。當任務涉及 display 五頁 hero photo、gallery photo、KPI/flow/circuit icon、ornament、asset manifest、prompt recipe、後處理與 preview QA 時使用。"
model = "gpt-5.3-codex-spark"
